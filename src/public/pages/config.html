<!-- ═══════════════════════════════════════════════════════════════════════
             Page: Config
             ═══════════════════════════════════════════════════════════════════════ -->
          <div class="page" id="page-config">
            <div class="config-card">
              <div class="config-card-header">
                <span class="icon">router</span> System Proxy Setup
              </div>
              <div class="config-form-row">
                <div class="input-field f-address">
                  <label>Address</label>
                  <div class="input-wrap">
                    <span class="icon icon-sm leading-icon">dns</span>
                    <input type="text" id="config-host" placeholder="127.0.0.1">
                  </div>
                </div>
                <div class="input-field f-port">
                  <label>Port</label>
                  <div class="input-wrap">
                    <span class="icon icon-sm leading-icon">settings_ethernet</span>
                    <input type="number" id="config-port" min="1" max="65535">
                  </div>
                </div>
                <div class="input-field f-proto">
                  <label>Protocol</label>
                  <div class="select-field" id="config-proto-select">
                    <div class="select-trigger">
                      <span class="select-value">HTTP</span>
                      <span class="icon icon-sm arrow">expand_more</span>
                    </div>
                    <div class="select-dropdown">
                      <div class="select-option selected" data-value="HTTP">HTTP</div>
                      <div class="select-option" data-value="SOCKS5">SOCKS5</div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="config-form-row">
                <div class="input-field f-user">
                  <label>Username</label>
                  <div class="input-wrap">
                    <span class="icon icon-sm leading-icon">person</span>
                    <input type="text" id="config-user" placeholder="Optional">
                  </div>
                </div>
                <div class="input-field f-pass">
                  <label>Password</label>
                  <div class="input-wrap">
                    <span class="icon icon-sm leading-icon">key</span>
                    <input type="password" id="config-pass" placeholder="Optional">
                  </div>
                </div>
              </div>
              <div class="action-row">
                <button class="btn btn-tonal" id="btn-config-disconnect" disabled style="flex:1">
                  <span class="icon icon-sm">link_off</span> Disconnect Proxy
                </button>
                <button class="btn btn-primary" id="btn-config" style="flex:1">
                  <span class="icon icon-sm">check_circle</span> Apply Proxy
                </button>
                <span class="icon admin-lock-icon" id="admin-lock-icon"
                  title="Administrator Privilege Status">lock</span>
              </div>
            </div>

            <!-- Local Proxy Detection -->
            <div class="local-proxy-section" id="local-proxy-section">
              <div class="recent-configs-label">
                <div class="label-text">
                  <span class="icon icon-sm">radar</span> 本地代理端口检测
                </div>
                <button class="btn btn-text" id="btn-refresh-local-proxy" style="font-size:12px">刷新</button>
              </div>
              <div class="local-proxy-hint">
                自动扫描本机常见代理端口，检测正在运行的代理服务。
                点击端口或进程名可以直接填入上方配置表单。
              </div>
              <div class="local-proxy-list" id="local-proxy-list">
                <div class="local-proxy-empty">正在检测本地代理服务...</div>
              </div>
            </div>

            <!-- Recent Configs -->
            <div class="recent-configs-section" id="recent-configs-section">
              <div class="recent-configs-label">
                <div class="label-text">
                  <span class="icon icon-sm">history</span> RECENT CONFIGURATIONS
                </div>
                <button class="btn btn-text" id="btn-clear-recent" style="font-size:12px">CLEAR HISTORY</button>
              </div>
              <div class="recent-configs-grid" id="recent-configs-list"></div>
            </div>
          </div>
